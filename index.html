<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | InnovateHub</title>
    <style>
        /* ---------- RESET & BASE ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            padding: 30px 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ---------- HEADER ---------- */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 2.8rem;
            color: #0f172a;
            margin-bottom: 10px;
        }
        .page-header p {
            font-size: 1.2rem;
            color: #475569;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ---------- SERVICE GRID ---------- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* ---------- SERVICE CARD ---------- */
        .service-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.12);
        }
        .service-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .service-card:hover img {
            transform: scale(1.03);
        }
        .service-card .content {
            padding: 20px;
        }
        .service-card .content h3 {
            font-size: 1.4rem;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .service-card .content .category {
            display: inline-block;
            background: gold;
            color: black;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .service-card .content p {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ---------- LOADING & ERROR ---------- */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #b13e3e;
            background: #ffe0db;
            border-radius: 16px;
            grid-column: 1 / -1;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 2rem; }
            .services-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
        @media (max-width: 480px) {
            .services-grid { grid-template-columns: 1fr; }
            .service-card img { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="page-header">
            <h1>🚀 Our Services</h1>
            <p>We offer a wide range of digital solutions to accelerate your business growth.</p>
        </header>

        <div id="servicesContainer" class="services-grid">
            <div class="loading">Loading services...</div>
        </div>
    </div>

    <script>
        const API_URL = 'api.php';
        const container = document.getElementById('servicesContainer');

        async function fetchServices() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                renderServices(data);
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        ❌ Failed to load services. Please try again later.
                    </div>
                `;
                console.error('Error:', error);
            }
        }

        function renderServices(services) {
            if (!services || services.length === 0) {
                container.innerHTML = `
                    <div class="error">😕 No services found.</div>
                `;
                return;
            }

            container.innerHTML = services.map(service => `
                <div class="service-card">
                    <img src="${service.image_url || 'https://picsum.photos/seed/default/400/300'}" alt="${service.title}" onerror="this.src='https://picsum.photos/seed/fallback/400/300'">
                    <div class="content">
                        <span class="category">${escapeHtml(service.category || 'General')}</span>
                        <h3>${escapeHtml(service.title)}</h3>
                        <p>${escapeHtml(service.description)}</p>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.addEventListener('DOMContentLoaded', fetchServices);
    </script>

</body>
</html>
